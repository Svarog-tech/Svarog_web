<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#132042"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- Server/Cloud icon -->
  <g transform="translate(600, 220)" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
    <!-- Cloud shape -->
    <path d="M-40,-50 C-40,-80 -10,-95 20,-85 C30,-110 70,-110 80,-85 C110,-90 120,-60 100,-40 L-30,-40 C-55,-40 -55,-50 -40,-50Z"/>
    <!-- Server rack below cloud -->
    <rect x="-35" y="-25" width="70" height="20" rx="3"/>
    <rect x="-35" y="0" width="70" height="20" rx="3"/>
    <rect x="-35" y="25" width="70" height="20" rx="3"/>
    <!-- Server dots -->
    <circle cx="-20" cy="-15" r="3" fill="url(#accent)"/>
    <circle cx="-20" cy="10" r="3" fill="url(#accent)"/>
    <circle cx="-20" cy="35" r="3" fill="url(#accent)"/>
    <!-- Server lines -->
    <line x1="-5" y1="-15" x2="25" y2="-15"/>
    <line x1="-5" y1="10" x2="25" y2="10"/>
    <line x1="-5" y1="35" x2="25" y2="35"/>
  </g>

  <!-- Main title -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#ffffff">
    Alatyr Hosting
  </text>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#94a3b8">
    Profesionální webhosting
  </text>

  <!-- Accent line below tagline -->
  <rect x="500" y="445" width="200" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>

  <!-- Bottom info -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#64748b">
    alatyrhosting.eu
  </text>
</svg>
