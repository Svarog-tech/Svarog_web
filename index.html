<!DOCTYPE html>
<html lang="cs">
  <head><meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta
      name="description"
      content="Alatyr Hosting – profesionální webhosting, domény a serverová řešení. SSL zdarma, podpora 24/7, HestiaCP panel. Vyberte si hosting nebo doménu."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Alatyr Hosting" />
    <meta property="og:title" content="Alatyr Hosting – Webhosting a domény" />
    <meta property="og:description" content="Profesionální webhosting, domény a serverová řešení. SSL zdarma, podpora 24/7." />
    <meta property="og:locale" content="cs_CZ" />
    <meta property="og:url" content="https://alatyrhosting.eu/" />
    <meta property="og:image" content="https://alatyrhosting.eu/alatyrlogo-removebg-preview.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alatyr Hosting – Webhosting a domény" />
    <meta name="twitter:description" content="Profesionální webhosting, domény a serverová řešení. SSL zdarma, podpora 24/7." />

    <!-- Security headers (nasměrují se přes nginx/HTTP, tady jen informativně) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Alatyr Hosting – Webhosting, domény a serverová řešení</title>

    <!-- Structured Data (JSON-LD) – produkce: https://alatyrhosting.eu -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Alatyr Hosting",
      "alternateName": "Alatyr Hosting - Webhosting a domény",
      "url": "https://alatyrhosting.eu/",
      "description": "Profesionální webhosting, domény a serverová řešení. SSL zdarma, podpora 24/7.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://alatyrhosting.eu/hosting",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Alatyr Hosting",
      "url": "https://alatyrhosting.eu/",
      "logo": "https://alatyrhosting.eu/alatyrlogo-removebg-preview.png",
      "description": "Profesionální webhosting, domény a serverová řešení."
    }
    </script>
  </head>
  <body>
    <noscript>Pro spuštění aplikace je potřeba zapnout JavaScript.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
  </html>
