    <a href="#main-content" class="skip-link" style="position:absolute;top:-100px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--primary-color,#6366f1);color:#fff;padding:0.75rem 1.5rem;font-weight:600;border-radius:0.375rem;text-decoration:none;transition:top 0.2s ease;" onfocus="this.style.top='1rem'" onblur="this.style.top='-100px'">Přeskočit na obsah</a>
    <noscript>
      <main>
        <h1>Alatyr Hosting – Webhosting, domény a serverová řešení</h1>
        <p>Profesionální webhosting, domény a serverová řešení. SSL zdarma, podpora 24/7, HestiaCP panel. Pro plný zážitek zapněte JavaScript.</p>
        <nav>
          <ul>

    <main id="main-content" role="main">
      <div id="root"></div>
    </main>
    <footer id="static-footer" style="text-align:center;padding:1rem;font-size:0.875rem;">
      <a href="/privacy">Zásady ochrany soukromí</a> |
      <a href="/terms">Obchodní podmínky</a> |
      <a href="/about">O nás</a> |
      <a href="/contact">Kontakt</a>
    </footer>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Hide static footer after React mounts (prevents duplicate footer)
      const observer = new MutationObserver(() => {
        if (document.getElementById('root')?.children.length > 0) {
          const sf = document.getElementById('static-footer');
          if (sf) sf.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
